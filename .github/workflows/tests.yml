name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [11, 12, 13]
        prefer-lowest: [false]
        exclude:
          - php: 8.2
            laravel: 13

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-lock

      - name: Install dependencies
        env:
          COMPOSER_POLICY_ADVISORIES_BLOCK: false
        run: |
          composer require "illuminate/support:^${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --with-all-dependencies

      - name: Debug package versions
        run: |
          composer show laravel/framework orchestra/testbench phpunit/phpunit | grep -E "^(name|versions)" || true

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run tests
        run: vendor/bin/phpunit --no-coverage
